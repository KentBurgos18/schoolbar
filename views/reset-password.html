<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SchoolBar — Nueva contraseña</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1e3a8a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Glory's Snack" />
  <link rel="apple-touch-icon" href="/logo.jpeg" />
  <link rel="stylesheet" href="/css/theme.css" />
  <style>
    body { background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 50%, #2563eb 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }

    .wrap { width: 100%; max-width: 400px; }

    .brand { text-align: center; margin-bottom: 32px; }
    .brand .logo {
      width: 64px; height: 64px; background: rgba(255,255,255,.15);
      border-radius: 18px; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px; backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.2);
    }
    .brand .logo svg { width: 32px; height: 32px; color: #fff; }
    .brand h1 { font-size: 28px; font-weight: 800; color: #fff; letter-spacing: -.5px; }
    .brand p  { color: rgba(255,255,255,.65); font-size: 14px; margin-top: 4px; }

    .card {
      background: #fff; border-radius: 18px;
      padding: 32px; box-shadow: 0 25px 50px rgba(0,0,0,.25);
    }
    .card h2    { font-size: 20px; font-weight: 700; color: var(--gray-900); margin-bottom: 6px; }
    .card .sub  { font-size: 13.5px; color: var(--gray-500); margin-bottom: 28px; }

    .btn-main {
      width: 100%; padding: 11px; font-size: 15px; font-weight: 700;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: #fff; border: none; border-radius: 10px; cursor: pointer;
      font-family: inherit; transition: opacity .15s; margin-top: 4px;
    }
    .btn-main:hover    { opacity: .9; }
    .btn-main:disabled { opacity: .6; cursor: not-allowed; }

    .msg {
      border-radius: 8px; padding: 10px 14px; font-size: 13px; font-weight: 500;
      margin-bottom: 16px; display: none;
    }
    .msg.error   { background: var(--danger-light);  color: var(--danger); }
    .msg.success { background: var(--success-light); color: var(--success); }

    .footer-note { text-align: center; margin-top: 20px; font-size: 12px; color: rgba(255,255,255,.5); }
    .back-link   { display: block; text-align: center; margin-top: 16px; font-size: 13px; color: var(--primary); text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9,22 9,12 15,12 15,22"/>
        </svg>
      </div>
      <h1>SchoolBar</h1>
      <p>Sistema de bar escolar</p>
    </div>

    <div class="card">
      <h2>Nueva contraseña</h2>
      <p class="sub">Ingresa tu nueva contraseña. Debe tener al menos 6 caracteres.</p>

      <div class="msg" id="msgEl"></div>

      <div id="formWrap">
        <div class="form-group">
          <label class="form-label">Nueva contraseña</label>
          <input type="password" id="pass1" class="form-control" placeholder="••••••••" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label class="form-label">Confirmar contraseña</label>
          <input type="password" id="pass2" class="form-control" placeholder="••••••••" autocomplete="new-password" />
        </div>
        <button class="btn-main" id="btnReset" onclick="doReset()">Guardar contraseña</button>
      </div>

      <a href="/login" class="back-link">← Volver al inicio de sesión</a>
    </div>

    <p class="footer-note">SchoolBar &copy; 2025 &mdash; Acceso seguro</p>
  </div>

  <script>
    var token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.getElementById('msgEl').className = 'msg error';
      document.getElementById('msgEl').textContent = 'Enlace inválido. Solicita uno nuevo desde el login.';
      document.getElementById('msgEl').style.display = 'block';
      document.getElementById('formWrap').style.display = 'none';
    }

    async function doReset() {
      var p1  = document.getElementById('pass1').value;
      var p2  = document.getElementById('pass2').value;
      var msg = document.getElementById('msgEl');
      var btn = document.getElementById('btnReset');

      msg.style.display = 'none';
      if (!p1) { showMsg('Ingresa una contraseña', 'error'); return; }
      if (p1.length < 6) { showMsg('La contraseña debe tener al menos 6 caracteres', 'error'); return; }
      if (p1 !== p2)     { showMsg('Las contraseñas no coinciden', 'error'); return; }

      btn.disabled = true;
      btn.textContent = 'Guardando...';
      try {
        var res  = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: p1 })
        });
        var data = await res.json();
        if (!res.ok) { showMsg(data.error, 'error'); return; }

        showMsg(data.message, 'success');
        document.getElementById('formWrap').style.display = 'none';
        setTimeout(() => { window.location.href = '/login'; }, 2500);
      } catch {
        showMsg('Error de conexión. Intenta de nuevo.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Guardar contraseña';
      }
    }

    function showMsg(text, type) {
      var el = document.getElementById('msgEl');
      el.className = 'msg ' + type;
      el.textContent = text;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
