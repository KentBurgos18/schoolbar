<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SchoolBar — Iniciar sesión</title>
  <link rel="stylesheet" href="/css/theme.css" />
  <style>
    body { background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 50%, #2563eb 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
    @media (max-width: 480px) {
      .login-card { padding: 24px 20px; }
      .login-brand h1 { font-size: 24px; }
    }

    .login-wrap { width: 100%; max-width: 400px; }

    .login-brand { text-align: center; margin-bottom: 32px; }
    .login-brand .logo {
      width: 64px; height: 64px; background: rgba(255,255,255,.15);
      border-radius: 18px; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px; backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.2);
    }
    .login-brand .logo svg { width: 32px; height: 32px; color: #fff; }
    .login-brand h1 { font-size: 28px; font-weight: 800; color: #fff; letter-spacing: -.5px; }
    .login-brand p { color: rgba(255,255,255,.65); font-size: 14px; margin-top: 4px; }

    .login-card {
      background: #fff; border-radius: 18px;
      padding: 32px; box-shadow: 0 25px 50px rgba(0,0,0,.25);
    }
    .login-card h2 { font-size: 20px; font-weight: 700; color: var(--gray-900); margin-bottom: 6px; }
    .login-card .subtitle { font-size: 13.5px; color: var(--gray-500); margin-bottom: 28px; }

    .login-btn {
      width: 100%; padding: 11px; font-size: 15px; font-weight: 700;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: #fff; border: none; border-radius: 10px; cursor: pointer;
      font-family: inherit; transition: opacity .15s; margin-top: 4px;
    }
    .login-btn:hover { opacity: .9; }
    .login-btn:disabled { opacity: .6; cursor: not-allowed; }

    .error-msg {
      background: var(--danger-light); color: var(--danger);
      border-radius: 8px; padding: 10px 14px; font-size: 13px; font-weight: 500;
      margin-bottom: 16px; display: none;
    }

    .footer-note { text-align: center; margin-top: 20px; font-size: 12px; color: rgba(255,255,255,.5); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9,22 9,12 15,12 15,22"/>
        </svg>
      </div>
      <h1>SchoolBar</h1>
      <p>Sistema de bar escolar</p>
    </div>

    <div class="login-card">
      <h2>Bienvenido de nuevo</h2>
      <p class="subtitle">Ingresa tus credenciales para continuar</p>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Correo electrónico</label>
          <input type="email" id="email" class="form-control" placeholder="correo@ejemplo.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="login-btn" id="loginBtn">Iniciar sesión</button>
      </form>

    </div>

    <p class="footer-note">SchoolBar &copy; 2025 &mdash; Acceso seguro</p>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('errorMsg');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Ingresando...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error || 'Error al iniciar sesión';
          errEl.style.display = 'block';
          return;
        }
        localStorage.setItem('sbToken', data.token);
        localStorage.setItem('sbUser', JSON.stringify(data.user));

        const redirects = { ADMIN: '/admin', PARENT: '/padres', CASHIER: '/cajero' };
        window.location.href = redirects[data.user.role] || '/';
      } catch {
        errEl.textContent = 'No se pudo conectar con el servidor';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Iniciar sesión';
      }
    });
  </script>
</body>
</html>
