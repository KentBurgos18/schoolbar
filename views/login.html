<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
  <title>SchoolBar — Iniciar sesión</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1e3a8a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Glory's Snack" />
  <link rel="apple-touch-icon" href="/logo.jpeg" />
  <link rel="stylesheet" href="/css/theme.css" />
  <style>
    body { background: linear-gradient(135deg, #3D0E06 0%, #C0391F 60%, #E8A500 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
    @media (max-width: 480px) {
      .login-card { padding: 24px 20px; }
      .login-brand h1 { font-size: 24px; }
    }

    .login-wrap { width: 100%; max-width: 400px; }

    .login-brand { text-align: center; margin-bottom: 32px; }
    .login-brand .logo { margin: 0 auto 12px; }
    .login-brand .logo img { width: 150px; height: 150px; object-fit: cover; border-radius: 32px; filter: drop-shadow(0 4px 16px rgba(0,0,0,.35)); }
    .login-brand p { color: rgba(255,255,255,.70); font-size: 14px; margin-top: 2px; }

    .login-card {
      background: #fff; border-radius: 18px;
      padding: 32px; box-shadow: 0 25px 50px rgba(0,0,0,.25);
    }
    .login-card h2 { font-size: 20px; font-weight: 700; color: var(--gray-900); margin-bottom: 6px; }
    .login-card .subtitle { font-size: 13.5px; color: var(--gray-500); margin-bottom: 28px; }

    .login-btn {
      width: 100%; padding: 11px; font-size: 15px; font-weight: 700;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: #fff; border: none; border-radius: 10px; cursor: pointer;
      font-family: inherit; transition: opacity .15s; margin-top: 4px;
    }
    .login-btn:hover { opacity: .9; }
    .login-btn:disabled { opacity: .6; cursor: not-allowed; }

    .error-msg {
      background: var(--danger-light); color: var(--danger);
      border-radius: 8px; padding: 10px 14px; font-size: 13px; font-weight: 500;
      margin-bottom: 16px; display: none;
    }

    .footer-note { text-align: center; margin-top: 20px; font-size: 12px; color: rgba(255,255,255,.5); }

    .forgot-link { display: block; text-align: right; font-size: 12.5px; color: var(--primary); text-decoration: none; margin-top: -8px; margin-bottom: 16px; cursor: pointer; }
    .forgot-link:hover { text-decoration: underline; }

    .forgot-panel { display: none; }
    .success-msg {
      background: #f0fdf4; color: #15803d;
      border-radius: 8px; padding: 10px 14px; font-size: 13px; font-weight: 500;
      margin-bottom: 16px; display: none;
    }
    .back-btn { background: none; border: none; color: var(--primary); font-size: 13px; cursor: pointer; padding: 0; font-family: inherit; margin-bottom: 16px; }
    .back-btn:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-brand">
      <div class="logo">
        <img src="/logo.jpeg" alt="Glory's Snack" />
      </div>
    </div>

    <div class="login-card">

      <!-- ── Panel: Iniciar sesión ── -->
      <div id="loginPanel">
        <h2>Bienvenido de nuevo</h2>
        <p class="subtitle">Ingresa tus credenciales para continuar</p>

        <div class="error-msg" id="errorMsg"></div>

        <form id="loginForm">
          <div class="form-group">
            <label class="form-label">Correo electrónico</label>
            <input type="email" id="email" class="form-control" placeholder="correo@ejemplo.com" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password" />
          </div>
          <a class="forgot-link" onclick="showForgot()">¿Olvidaste tu contraseña?</a>
          <button type="submit" class="login-btn" id="loginBtn">Iniciar sesión</button>
        </form>
      </div>

      <!-- ── Panel: Recuperar contraseña ── -->
      <div id="forgotPanel" class="forgot-panel">
        <button class="back-btn" onclick="showLogin()">← Volver al inicio de sesión</button>
        <h2>Recuperar contraseña</h2>
        <p class="subtitle">Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.</p>

        <div class="error-msg"  id="forgotError"></div>
        <div class="success-msg" id="forgotSuccess"></div>

        <div class="form-group">
          <label class="form-label">Correo electrónico</label>
          <input type="email" id="forgotEmail" class="form-control" placeholder="correo@ejemplo.com" autocomplete="email" />
        </div>
        <button class="login-btn" id="forgotBtn" onclick="sendForgot()">Enviar enlace de recuperación</button>
      </div>

    </div>

    <p class="footer-note" id="footerNote">SchoolBar &copy; <span id="footerYear"></span> &mdash; Acceso seguro</p>
    <script>
      document.getElementById('footerYear').textContent = new Date().getFullYear();
      fetch('/api/settings/public').then(r=>r.json()).then(d=>{
        var n = d.school_name || 'SchoolBar';
        document.getElementById('footerNote').innerHTML = n + ' &copy; ' + new Date().getFullYear() + ' &mdash; Acceso seguro';
      }).catch(()=>{});
    </script>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn   = document.getElementById('loginBtn');
      const errEl = document.getElementById('errorMsg');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Ingresando...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email:    document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error || 'Error al iniciar sesión';
          errEl.style.display = 'block';
          return;
        }
        localStorage.setItem('sbToken', data.token);
        localStorage.setItem('sbUser', JSON.stringify(data.user));
        if (data.user.role === 'PARENT') {
          // Si es profesor, verificar si tiene hijos para decidir dashboard
          try {
            const meRes = await fetch('/api/parents/me', { headers: { 'Authorization': 'Bearer ' + data.token } });
            const me = await meRes.json();
            if (me.is_teacher && (!me.students || me.students.length === 0)) {
              window.location.href = '/profesor';
              return;
            }
          } catch {}
          window.location.href = '/padres';
          return;
        }
        const redirects = { ADMIN: '/admin', CASHIER: '/cajero' };
        window.location.href = redirects[data.user.role] || '/';
      } catch {
        errEl.textContent = 'No se pudo conectar con el servidor';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Iniciar sesión';
      }
    });

    function showForgot() {
      document.getElementById('loginPanel').style.display  = 'none';
      document.getElementById('forgotPanel').style.display = 'block';
      document.getElementById('forgotEmail').focus();
    }

    function showLogin() {
      document.getElementById('forgotPanel').style.display = 'none';
      document.getElementById('loginPanel').style.display  = 'block';
      document.getElementById('forgotError').style.display   = 'none';
      document.getElementById('forgotSuccess').style.display = 'none';
    }

    async function sendForgot() {
      const email   = document.getElementById('forgotEmail').value.trim();
      const errEl   = document.getElementById('forgotError');
      const succEl  = document.getElementById('forgotSuccess');
      const btn     = document.getElementById('forgotBtn');

      errEl.style.display  = 'none';
      succEl.style.display = 'none';

      if (!email) { errEl.textContent = 'Ingresa tu correo electrónico'; errEl.style.display = 'block'; return; }

      btn.disabled = true;
      btn.textContent = 'Enviando...';
      try {
        const res  = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.error; errEl.style.display = 'block'; return; }
        succEl.textContent   = data.message;
        succEl.style.display = 'block';
        btn.style.display    = 'none';
      } catch {
        errEl.textContent = 'Error de conexión. Intenta de nuevo.';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        if (btn.style.display !== 'none') btn.textContent = 'Enviar enlace de recuperación';
      }
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
  <script src="/js/pwa-install.js"></script>
</body>
</html>
